    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500&display=swap');
        html,body{font-family:'Poppins',sans-serif;background-image:url('font.png');background-size:cover;background-position:center;background-attachment:fixed;color:#fff;min-height:100vh}

        .category-card{opacity:0;transform:translateY(80px);transition:all .9s ease-out;border-radius:1.75rem;overflow:hidden;box-shadow:0 15px 35px rgba(0,0,0,.5);padding:12px;background:rgba(0,0,0,.25)}

        .carousel-slide img{width:100%;height:340px;object-fit:cover}
        .carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.7);color:#fff;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;z-index:10;transition:all .3s}
        .carousel-btn:hover{background:#F5C400;color:#000}
        .carousel-prev{left:15px}.carousel-next{right:15px}
        .carousel-dots{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
        .dot{width:11px;height:11px;background:rgba(255,255,255,.5);border-radius:50%;cursor:pointer;transition:all .3s}
        .dot.active{background:#F5C400;transform:scale(1.4)}
        #cart-panel{position:fixed;right:-440px;top:0;bottom:0;width:420px;max-width:100vw;background:rgba(10,10,10,.97);backdrop-filter:blur(20px);border-left:1px solid rgba(245,196,0,.3);z-index:200;transition:right .4s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column}
        #cart-panel.open{right:0}
        .cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;display:none}
        .cart-overlay.active{display:block}

        .add-btn:hover{transform:scale(1.1)}

const sections=[

const container=document.getElementById('categories');
sections.forEach((sec,index)=>{
    const card=document.createElement('button');
    card.className='category-card w-full aspect-video relative';
    card.innerHTML=`<div class="category-image-container rounded-3xl overflow-hidden shadow-xl"><img src="${sec.img}" class="w-full h-full object-cover"></div><div class="absolute inset-x-0 bottom-8"><div class="text-center"><h2 class="logo-font text-4xl sm:text-5xl font-bold tracking-wider section-title">${sec.title}</h2></div></div>`;

let autoIntervals={},currentSlides={};

function createCarousel(sectionId){
    let images=Array.from({length:3},(_,i)=>{
        if(sectionId==="alimentos")return`carualimentos${i+1}.png`;
        if(sectionId==="desayunos")return`cardesayunos${i+1}.png`;
        if(sectionId==="pan-salado")return`carpansalado${i+1}.png`;
        if(sectionId==="pan-dulce")return`carpandulce${i+1}.png`;
        if(sectionId==="bebidas")return`carbebidas${i+1}.png`;
    });
    let html=`<div class="carousel" id="carousel-${sectionId}"><div class="carousel-inner" id="inner-${sectionId}">`;
    images.forEach((img,i)=>{html+=`<div class="carousel-slide ${i===0?'':'hidden'}" data-index="${i}"><img src="${img}" alt="${sectionId} ${i+1}"></div>`;});
    html+=`</div><button class="carousel-btn carousel-prev" onclick="prevSlide('${sectionId}')">‹</button><button class="carousel-btn carousel-next" onclick="nextSlide('${sectionId}')">›</button><div class="carousel-dots" id="dots-${sectionId}"></div></div>`;
    return html;
}

function initCarousel(sectionId){
    const dotsContainer=document.getElementById(`dots-${sectionId}`);
    const slides=document.querySelectorAll(`#inner-${sectionId} .carousel-slide`);
    currentSlides[sectionId]=0;
    dotsContainer.innerHTML='';
    slides.forEach((_,i)=>{
        const dot=document.createElement('div');
        dot.className=`dot ${i===0?'active':''}`;
        dot.onclick=()=>goToSlide(sectionId,i);
        dotsContainer.appendChild(dot);
    });
    updateCarousel(sectionId);
    if(autoIntervals[sectionId])clearInterval(autoIntervals[sectionId]);
    autoIntervals[sectionId]=setInterval(()=>nextSlide(sectionId),3000);
}

function updateCarousel(sectionId){
    const inner=document.getElementById(`inner-${sectionId}`);
    const slides=document.querySelectorAll(`#inner-${sectionId} .carousel-slide`);
    const dots=document.querySelectorAll(`#dots-${sectionId} .dot`);
    inner.style.transform=`translateX(-${currentSlides[sectionId]*100}%)`;
    slides.forEach((s,i)=>s.classList.toggle('hidden',i!==currentSlides[sectionId]));
    dots.forEach((d,i)=>d.classList.toggle('active',i===currentSlides[sectionId]));
}

window.nextSlide=function(sectionId){
    const count=document.querySelectorAll(`#inner-${sectionId} .carousel-slide`).length;
    currentSlides[sectionId]=(currentSlides[sectionId]+1)%count;
    updateCarousel(sectionId);
};
window.prevSlide=function(sectionId){
    const count=document.querySelectorAll(`#inner-${sectionId} .carousel-slide`).length;
    currentSlides[sectionId]=(currentSlides[sectionId]-1+count)%count;
    updateCarousel(sectionId);
};
window.goToSlide=function(sectionId,index){currentSlides[sectionId]=index;updateCarousel(sectionId);};

function slugify(s){return s.toLowerCase().replace(/[^a-z0-9]/g,'-');}
function ea(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

let MODAL={};
function renderItemControl(slug){
    const el=document.getElementById('ctrl-'+slug);
    const m=MODAL[slug];
    if(!el||!m)return;
    const key=m.name+'|'+(m.size||'');
    const ci=cart.find(i=>(i.name+'|'+(i.size||''))===key);
    const qty=ci?ci.qty:0;
    if(qty<=0){
        el.innerHTML=`<button class="add-btn bg-[#F5C400] text-black w-9 h-9 rounded-full flex items-center justify-center font-bold text-xl" onclick="addToCart('${ea(m.name)}',${m.price},'${ea(m.desc)}','${ea(m.size||'')}')">+</button>`;
    }else{
        el.innerHTML=`<div class="flex items-center gap-2 bg-black/40 rounded-full px-1 py-0.5">
            <button class="qty-btn bg-white/15 hover:bg-white/30 text-white" onclick="removeFromCart('${ea(m.name)}','${ea(m.size||'')}')">−</button>
            <span class="text-[#F5C400] font-bold w-6 text-center">${qty}</span>
            <button class="qty-btn bg-[#F5C400] text-black" onclick="addToCart('${ea(m.name)}',${m.price},'${ea(m.desc)}','${ea(m.size||'')}')">+</button>
        </div>`;
    }
}
function refreshModalControls(){Object.keys(MODAL).forEach(renderItemControl);}

function openModal(sec){
    const modal=document.getElementById('modal');
    const content=document.getElementById('modal-content');
    const items=MENU_DATA[sec.id]||[];
    MODAL={};
    let itemsHtml=items.map(item=>{
        const hasSizes=item.sizes&&item.sizes.length>0;
        const slug=slugify(item.name);
        const sizeName=s=>s.label.split('$')[0].trim();
        const sizesHtml=hasSizes?`<div class="flex gap-2 mt-2 flex-wrap" id="sizes-${slug}">`+item.sizes.map((s,i)=>`<button class="size-btn ${i===0?'selected':''}" onclick="selectSize('${slug}',${i},${s.price},'${ea(item.name)}','${ea(sizeName(s))}')">${s.label}</button>`).join('')+`</div>`:'';
        const displayPrice=hasSizes?item.sizes[0].price:item.price;
        const initSize=hasSizes?sizeName(item.sizes[0]):'';
        MODAL[slug]={name:item.name,desc:item.desc||'',price:displayPrice,size:initSize};
        return`<div class="flex justify-between items-start border-b border-white/20 pb-4 gap-4"><div class="flex-1"><span class="font-bold block">${item.name}</span>${item.desc?`<small class="text-white/60 block">${item.desc}</small>`:''}${sizesHtml}</div><div class="flex items-center gap-3 flex-shrink-0"><span class="font-bold text-lg text-[#F5C400]" id="price-${slug}">$${displayPrice}</span><div id="ctrl-${slug}"></div></div></div>`;
    }).join('');
    content.innerHTML=`<h2 class="logo-font text-5xl font-bold text-center mb-8 text-white">${sec.title}</h2>${createCarousel(sec.id)}<div class="space-y-4">${itemsHtml}</div>`;
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    refreshModalControls();
    setTimeout(()=>initCarousel(sec.id),150);
}

window.selectSize=function(slug,idx,price,itemName,size){
    document.querySelectorAll(`#sizes-${slug} .size-btn`).forEach((b,i)=>b.classList.toggle('selected',i===idx));
    document.getElementById(`price-${slug}`).textContent=`$${price}`;
    if(MODAL[slug]){MODAL[slug].size=size;MODAL[slug].price=price;}
    renderItemControl(slug);
};

function closeModal(){
    document.getElementById('modal').classList.add('hidden');
    document.getElementById('modal').classList.remove('flex');
    Object.values(autoIntervals).forEach(i=>clearInterval(i));
    autoIntervals={};
}
document.addEventListener('keydown',e=>{if(e.key==="Escape")closeModal();});

// ==================== CARRITO ====================
let cart=[];

function cartKey(name,size){return name+'|'+(size||'');}

window.addToCart=function(name,price,desc,size){
    size=size||'';
    const existing=cart.find(i=>cartKey(i.name,i.size)===cartKey(name,size));
    if(existing)existing.qty++;
    else cart.push({name,price,desc,size,qty:1});
    updateCartUI();
    showToast(`+ ${name}${size?' ('+size+')':''}`);
};

window.removeFromCart=function(name,size){
    const idx=cart.findIndex(i=>cartKey(i.name,i.size)===cartKey(name,size||''));
    if(idx===-1)return;
    if(cart[idx].qty>1)cart[idx].qty--;
    else cart.splice(idx,1);
    updateCartUI();
};

function clearCart(){cart=[];updateCartUI();}

function updateCartUI(){
    const badge=document.getElementById('cart-badge');
    const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
    const count=cart.reduce((s,i)=>s+i.qty,0);
    badge.textContent=count;
    count>0?badge.classList.remove('hidden'):badge.classList.add('hidden');
    document.getElementById('cart-total').textContent=`$${total}`;
    const el=document.getElementById('cart-items');
    if(cart.length===0){el.innerHTML=`<p class="text-white/30 text-sm text-center py-8">Tu carrito está vacío</p>`;refreshModalControls();return;}
    el.innerHTML=cart.map(item=>`<div class="item-row py-3 flex items-center justify-between gap-3"><div class="flex-1 min-w-0"><p class="text-white text-sm font-medium truncate">${item.name}${item.size?` <span class="text-white/50">(${item.size})</span>`:''}</p><p class="text-[#F5C400] text-xs">$${item.price} c/u</p></div><div class="flex items-center gap-2"><button class="qty-btn bg-white/10 hover:bg-white/20 text-white" onclick="removeFromCart('${ea(item.name)}','${ea(item.size||'')}')">−</button><span class="text-white font-bold w-5 text-center text-sm">${item.qty}</span><button class="qty-btn bg-[#F5C400]/20 hover:bg-[#F5C400]/40 text-[#F5C400]" onclick="addToCart('${ea(item.name)}',${item.price},'','${ea(item.size||'')}')">+</button></div><span class="text-white font-bold text-sm w-14 text-right">$${item.price*item.qty}</span></div>`).join('');
    refreshModalControls();
}

function openCart(){document.getElementById('cart-panel').classList.add('open');document.getElementById('cart-overlay').classList.add('active');}
function closeCart(){document.getElementById('cart-panel').classList.remove('open');document.getElementById('cart-overlay').classList.remove('active');}

// ==================== ENVÍO DE PEDIDO (Firebase) ====================
function sendOrder(){
    if(cart.length===0){showToast('Agrega algo primero 😊');return;}
    const table=document.getElementById('table-input').value.trim();
    const phone=document.getElementById('phone-input').value.trim();
    if(!table){showToast('Escribe tu nombre 🙂');return;}
    if(phone.replace(/\D/g,'').length<10){showToast('Escribe un celular válido (10 dígitos) 📱');return;}
    if(typeof db==='undefined'||!db){showToast('⚠️ Falta configurar Firebase');return;}
    const newNotes=document.getElementById('order-notes').value.trim();
    const id=Date.now();
    const items=cart.map(i=>({...i}));
    const norm=s=>(s||'').trim().toLowerCase();
    db.ref('orders').once('value').then(snap=>{
        const all=snap.val()||{};
        // Si ya hay un pedido activo (no cobrado/cancelado) con el mismo nombre, se fusiona.
        const existing=Object.values(all).find(o=>o&&o.table&&norm(o.table)===norm(table)&&o.status!=='cobrado'&&o.status!=='cancelado');
        if(existing){
            const merged=Array.isArray(existing.items)?existing.items.map(i=>({...i})):[];
            items.forEach(c=>{
                const f=merged.find(i=>cartKey(i.name,i.size)===cartKey(c.name,c.size));
                if(f)f.qty+=c.qty; else merged.push({...c});
            });
            const total=merged.reduce((s,i)=>s+i.price*i.qty,0);
            const notes=[existing.notes,newNotes].filter(Boolean).join(' | ');
            return db.ref('orders/'+existing.id).update({items:merged,total,status:'nuevo',phone:phone||existing.phone||'',notes})
                     .then(()=>'¡Se sumó a tu pedido anterior! 🍞');
        }else{
            const order={id,table,phone,notes:newNotes,items,total:items.reduce((s,i)=>s+i.price*i.qty,0),status:'nuevo',createdAt:new Date().toISOString()};
            return db.ref('orders/'+id).set(order).then(()=>'¡Pedido enviado a cocina! 🍞');
        }
    }).then(msg=>{
        clearCart();
        document.getElementById('table-input').value='';
        document.getElementById('phone-input').value='';
        document.getElementById('order-notes').value='';
        closeCart();
        showToast(msg);
    }).catch(err=>{console.error(err);showToast('Error al enviar. Revisa tu conexión.');});
}

function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
